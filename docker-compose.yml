    pgsql:
        image: postgres:16
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: "${DB_DATABASE}"
            POSTGRES_USER: "${DB_USERNAME}"
            POSTGRES_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './vendor/laravel/sail/database/postgres/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
            # - pgsql_data:/var/lib/postgresql/data
        networks:
            - sail

    cron:
        build:
          context: .
          dockerfile: Dockerfile  # Path to your custom Dockerfile for cron
        volumes:
            - ./run-script.sh:/usr/local/bin/run-script.sh
            - ./my-crontab:/etc/cron.d/my-crontab
        networks:
          - sail

    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

