server {
    listen 80;
    server_name localhost; # Replace with your domain name if applicable

    if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
    }


    # Redirect all HTTP traffic to HTTPS
    # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost; # Replace with your domain name if applicable

    # SSL configuration
    ssl_certificate /etc/nginx/ssl/your-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/your-key.pem;
    root /var/www/html/public; # Laravel's public directory
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        proxy_pass http://laravel.test:80; # Forward requests to laravel.test on port 80
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;


    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass laravel.test:80; # Forward to Laravel Sail
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }
}
